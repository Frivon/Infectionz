<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login Infection Z</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Orbitron', sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      radial-gradient(circle at top, rgba(255,0,0,0.15), transparent 40%),
      linear-gradient(135deg,#000,#050505,#0d0000);
    }

    .login-card{
      width:100%;
      max-width:420px;
      background:rgba(12,12,12,0.88);
      border:1px solid rgba(255,0,0,0.18);
      border-radius:25px;
      padding:40px;
      backdrop-filter:blur(15px);
      box-shadow:0 10px 40px rgba(0,0,0,0.6), 0 0 30px rgba(255,0,0,0.15);
    }

    .login-title{
      text-align:center;
      margin-bottom:35px;
    }

    .login-title h1{
      color:#ff2d2d;
      font-size:2.2rem;
      text-shadow:0 0 10px red;
    }

    .input-box{
      position:relative;
      margin-bottom:25px;
    }

    .input-box input{
      width:100%;
      background:#111;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:14px;
      padding:15px 50px 15px 18px;
      color:white;
      outline:none;
    }

    .input-box i{
      position:absolute;
      right:18px;
      top:50%;
      transform:translateY(-50%);
      color:#ff2d2d;
    }

    .btn-login{
      width:100%;
      border:none;
      padding:15px;
      border-radius:14px;
      background:linear-gradient(135deg,#ff0000,#8b0000);
      color:white;
      font-weight:700;
      cursor:pointer;
      margin-top:10px;
    }

    #btnCadastro{
      background:linear-gradient(135deg,#00c853,#006b2d);
    }

  </style>

</head>

<body>

  <div class="login-card">

    <div class="login-title">
      <h1><i class="fa-solid fa-user-secret"></i> LOGIN INFECTION-Z</h1>
      <p>ENTRAR NO APOCALIPSE</p>
    </div>

    <form id="loginForm">

      <div class="input-box">
        <input id="email" type="email" placeholder="Seu e-mail" required>
        <i class="fa-solid fa-envelope"></i>
      </div>

      <div class="input-box">
        <input id="senha" type="password" placeholder="Sua senha" required>
        <i class="fa-solid fa-lock"></i>
      </div>

      <button class="btn-login" type="button" id="btnLogin">
        ENTRAR
      </button>

      <button class="btn-login" type="button" id="btnCadastro">
        CRIAR CONTA
      </button>

    </form>

  </div>

  <!-- FIREBASE -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // 🔥 SEU FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyAGnFnfpcZWHC8mXwqnyNmdR-mYuWmCmRc",
      authDomain: "infectionz-3f599.firebaseapp.com",
      projectId: "infectionz-3f599",
      storageBucket: "infectionz-3f599.firebasestorage.app",
      messagingSenderId: "280415727281",
      appId: "1:280415727281:web:64c2fd86589e248c9c7c90"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const email = document.getElementById("email");
    const senha = document.getElementById("senha");

    const btnLogin = document.getElementById("btnLogin");
    const btnCadastro = document.getElementById("btnCadastro");

    // 🔐 LOGIN
    btnLogin.addEventListener("click", async () => {
      try {
        const user = await signInWithEmailAndPassword(
          auth,
          email.value,
          senha.value
        );

        alert("Login realizado com sucesso!");
        window.location.href = "dashboard.html";

      } catch (error) {
        alert("Erro no login: " + error.message);
      }
    });

    // 🆕 CADASTRO + REDIRECIONAMENTO
    btnCadastro.addEventListener("click", async () => {
      try {
        const user = await createUserWithEmailAndPassword(
          auth,
          email.value,
          senha.value
        );

        alert("Conta criada com sucesso!");

        if (user.user) {
          window.location.href = "dashboard.html";
        }

      } catch (error) {
        alert("Erro no cadastro: " + error.message);
      }
    });

  </script>

</body>
</html>
