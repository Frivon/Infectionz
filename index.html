<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login Dark Red</title>

  <!-- GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Orbitron', sans-serif;
    }

    body{

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      background:
      radial-gradient(circle at top, rgba(255,0,0,0.15), transparent 40%),
      linear-gradient(135deg,#000000,#050505,#0d0000);

      overflow:hidden;
    }

    /* CARD LOGIN */

    .login-card{

      width:100%;
      max-width:420px;

      background:rgba(12,12,12,0.88);

      border:1px solid rgba(255,0,0,0.18);

      border-radius:25px;

      padding:40px;

      backdrop-filter:blur(15px);

      box-shadow:
      0 10px 40px rgba(0,0,0,0.6),
      0 0 30px rgba(255,0,0,0.15);

      position:relative;
      overflow:hidden;
    }

    .login-card::before{

      content:"";

      position:absolute;

      width:240px;
      height:240px;

      background:rgba(255,0,0,0.05);

      border-radius:50%;

      top:-120px;
      right:-120px;
    }

    /* TITLE */

    .login-title{

      text-align:center;
      margin-bottom:35px;
    }

    .login-title h1{

      color:#ff2d2d;

      font-size:2.2rem;

      text-shadow:
      0 0 10px #ff0000,
      0 0 25px rgba(255,0,0,0.6);

      margin-bottom:10px;
    }

    .login-title p{

      color:#999;
      font-size:0.9rem;
    }

    /* INPUTS */

    .input-box{

      position:relative;
      margin-bottom:25px;
    }

    .input-box input{

      width:100%;

      background:#111;

      border:1px solid rgba(255,255,255,0.08);

      border-radius:14px;

      padding:15px 50px 15px 18px;

      color:white;

      outline:none;

      transition:0.3s;
    }

    .input-box input:focus{

      border:1px solid #ff0000;

      box-shadow:
      0 0 15px rgba(255,0,0,0.35);
    }

    .input-box i{

      position:absolute;

      right:18px;
      top:50%;

      transform:translateY(-50%);

      color:#ff2d2d;
    }

    /* OPTIONS */

    .options{

      display:flex;
      justify-content:space-between;
      align-items:center;

      margin-bottom:25px;

      font-size:0.85rem;
    }

    .options label{

      color:#bbb;
    }

    .options a{

      color:#ff2d2d;
      text-decoration:none;
    }

    .options a:hover{

      text-decoration:underline;
    }

    /* BUTTON */

    .btn-login{

      width:100%;

      border:none;

      padding:15px;

      border-radius:14px;

      background:
      linear-gradient(135deg,#ff0000,#8b0000);

      color:white;

      font-weight:700;

      letter-spacing:1px;

      transition:0.3s;
    }

    .btn-login:hover{

      transform:translateY(-3px);

      box-shadow:
      0 0 25px rgba(255,0,0,0.45);

      background:
      linear-gradient(135deg,#ff2d2d,#a00000);
    }

    /* REGISTER */

    .register{

      text-align:center;

      margin-top:25px;

      color:#999;

      font-size:0.9rem;
    }

    .register a{

      color:#ff2d2d;
      text-decoration:none;
      font-weight:600;
    }

    .register a:hover{

      text-decoration:underline;
    }

    /* RESPONSIVO */

    @media(max-width:500px){

      .login-card{

        margin:20px;
        padding:30px 25px;
      }

      .login-title h1{

        font-size:1.8rem;
      }

    }

  </style>

</head>

<body>

  <div class="login-card">

    <!-- TITLE -->
    <div class="login-title">

      <h1>
        <i class="fa-solid fa-user-secret"></i>
        LOGIN INFECTION Z
      </h1>

      <p>ENTRAR NO APOCALIPSE</p>

    </div>

    <!-- FORM -->
    <form>

      <!-- EMAIL -->
      <div class="input-box">

        <input
          type="email"
          placeholder="Seu e-mail"
          required
        >

        <i class="fa-solid fa-envelope"></i>

      </div>

      <!-- PASSWORD -->
      <div class="input-box">

        <input
          type="password"
          placeholder="Sua senha"
          required
        >

        <i class="fa-solid fa-lock"></i>

      </div>

      <!-- OPTIONS -->
      <div class="options">

        <label>
          <input type="checkbox">
          Lembrar
        </label>

        <a href="#">
          Esqueci a senha
        </a>

      </div>

      <!-- BUTTON -->
      <button class="btn-login" type="submit">
        ENTRAR
      </button>

      <!-- REGISTER -->
      <div class="register">

        Não possui conta?
        <a href="#">
          Criar conta
        </a>

      </div>

    </form>

  </div>

  <!-- BOOTSTRAP JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
